name: Documentation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - 'README.md'

jobs:
  check-documentation:
    name: Check Documentation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Check markdown files
      run: |
        # Check all markdown files exist and are readable
        for file in README.md QUICKSTART.md CONTRIBUTING.md REFACTORING_COMPLETE.md PROJECT_REFACTORING.md; do
          if [ -f "$file" ]; then
            echo "Found $file"
            wc -l "$file"
          else
            echo "Missing $file"
          fi
        done

    - name: Validate markdown syntax
      run: |
        pip install mdformat
        mdformat --check *.md docs/*.md 2>/dev/null || echo "Markdown style suggestions available"

    - name: Check API documentation
      run: |
        if [ -f "docs/API.md" ]; then
          echo "API documentation exists"
          echo "API doc size: $(wc -l < docs/API.md) lines"
        else
          echo "API documentation missing!"
          exit 1
        fi

    - name: Verify links
      run: |
        echo "Checking documentation structure..."
        echo "Files:"
        ls -la *.md docs/*.md 2>/dev/null || echo "Some files missing"

  api-docs-validation:
    name: Validate API Documentation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Extract and validate functions from API.md
      run: |
        python << 'EOF'
        import re
        
        with open('docs/API.md', 'r') as f:
            content = f.read()
        
        # Count documented functions
        functions = re.findall(r'##### `([^`]+)`', content)
        classes = re.findall(r'##### Class: `([^`]+)`', content)
        
        print(f"Documented functions: {len(functions)}")
        print(f"Documented classes: {len(classes)}")
        
        if len(functions) > 0:
            print("Functions documented:")
            for func in functions[:5]:
                print(f"  - {func}")
            if len(functions) > 5:
                print(f"  ... and {len(functions) - 5} more")
        EOF
